name: Locus
options:
  bundleIdPrefix: com.locus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

packages:
  moonshine-swift:
    url: https://github.com/moonshine-ai/moonshine-swift.git
    from: "0.0.1"
  llama-swift:
    url: https://github.com/mattt/llama.swift.git
    from: "2.0.0"

targets:
  Locus:
    type: application
    platform: iOS
    sources:
      - path: Locus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.locus.app
        INFOPLIST_FILE: Locus/Info.plist
        CODE_SIGN_ENTITLEMENTS: Locus/Locus.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        OTHER_LDFLAGS: -lpocket_tts_ios
        CODE_SIGN_STYLE: Automatic
        # SDK-conditional paths: simulator vs device
        LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]:
          - $(inherited)
          - $(PROJECT_DIR)/Frameworks/PocketTTS.xcframework/ios-arm64-simulator
        LIBRARY_SEARCH_PATHS[sdk=iphoneos*]:
          - $(inherited)
          - $(PROJECT_DIR)/Frameworks/PocketTTS.xcframework/ios-arm64
        SWIFT_INCLUDE_PATHS[sdk=iphonesimulator*]: $(PROJECT_DIR)/Frameworks/PocketTTS.xcframework/ios-arm64-simulator/Headers
        SWIFT_INCLUDE_PATHS[sdk=iphoneos*]: $(PROJECT_DIR)/Frameworks/PocketTTS.xcframework/ios-arm64/Headers
    dependencies:
      - package: moonshine-swift
        product: Moonshine
      - package: llama-swift
        product: LlamaSwift
    info:
      path: Locus/Info.plist
      properties:
        CFBundleName: Locus
        CFBundleDisplayName: Locus
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Locus needs microphone access for voice conversations."
    entitlements:
      path: Locus/Locus.entitlements
      properties:
        com.apple.security.device.audio-input: true
