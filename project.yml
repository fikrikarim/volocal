name: Locus
options:
  bundleIdPrefix: com.locus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

packages:
  llama-swift:
    url: https://github.com/mattt/llama.swift.git
    from: "2.0.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: feat/pocket-tts-streaming

targets:
  Locus:
    type: application
    platform: iOS
    sources:
      - path: Locus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.locus.app
        INFOPLIST_FILE: Locus/Info.plist
        CODE_SIGN_ENTITLEMENTS: Locus/Locus.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: llama-swift
        product: LlamaSwift
      - package: FluidAudio
        product: FluidAudio
    info:
      path: Locus/Info.plist
      properties:
        CFBundleName: Locus
        CFBundleDisplayName: Locus
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Locus needs microphone access for voice conversations."
    entitlements:
      path: Locus/Locus.entitlements
      properties:
        com.apple.security.device.audio-input: true
