name: Volocal
options:
  bundleIdPrefix: com.volocal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

packages:
  llama-swift:
    url: https://github.com/mattt/llama.swift.git
    from: "2.0.0"
  FluidAudio:
    url: https://github.com/fikrikarim/FluidAudio.git
    branch: main

targets:
  Volocal:
    type: application
    platform: iOS
    sources:
      - path: Volocal
      - path: Volocal/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.volocal.app
        INFOPLIST_FILE: Volocal/Info.plist
        CODE_SIGN_ENTITLEMENTS: Volocal/Volocal.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: llama-swift
        product: LlamaSwift
      - package: FluidAudio
        product: FluidAudio
    info:
      path: Volocal/Info.plist
      properties:
        CFBundleName: Volocal
        CFBundleDisplayName: Volocal
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Volocal needs microphone access for voice conversations."
    entitlements:
      path: Volocal/Volocal.entitlements
      properties:
        com.apple.security.device.audio-input: true
